<!DOCTYPE html>
<html>
<head>
<title>Chat Bot</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin:0;
    font-family: "Segoe UI";
    background:#f0f2f5;
}

/* 🔥 BACKGROUND TEXT */
#bg-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    font-weight: 700;
    text-align: center;
    color: rgba(0,0,0,0.05);
    z-index: 0;
    pointer-events: none;
}

#bg-text span {
    display:block;
    font-size:48px;
    background: linear-gradient(135deg,#4c6ef5,#3b5bdb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity:0.15;
}

/* Button */
#chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 65px;
    height: 65px;
    background: linear-gradient(135deg,#4c6ef5,#3b5bdb);
    border-radius: 50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:22px;
    cursor:pointer;
    z-index:20;
}

/* Container */
#container {
    position: fixed;
    bottom: 100px;
    right: 20px;
    width: 360px;
    background: white;
    border-radius: 25px;
    display: none;
    flex-direction: column;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    z-index:10;
}

/* Header */
#header {
    background: linear-gradient(135deg,#4c6ef5,#3b5bdb);
    color:white;
    padding:20px;
    border-top-left-radius:25px;
    border-top-right-radius:25px;
}

#close {
    float:right;
    cursor:pointer;
}

/* Glass Form */
#form {
    padding:20px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
}

/* Inputs */
input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
}

button {
    width:100%;
    padding:14px;
    background:#3b5bdb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* Animated Text */
#hero-text {
    text-align:center;
    margin-top:30px;
    opacity:0;
    transform:translateY(20px);
    animation:fadeUp 1s ease forwards;
}

#hero-text span {
    display:block;
    font-size:20px;
    font-weight:600;
    background: linear-gradient(135deg,#4c6ef5,#3b5bdb);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

@keyframes fadeUp {
    to { opacity:1; transform:translateY(0); }
}

/* Chat */
#chat {
    display:none;
    flex-direction:column;
}

#chat.active {
    height:600px;
}

/* Chatbox */
#chatbox {
    flex:1;
    padding:15px;
    overflow-y:auto;
    background:#f7f7f7;
}

/* Messages */
.msg {
    max-width:75%;
    padding:12px;
    margin:10px;
    border-radius:15px;
}

.user {
    background: linear-gradient(135deg,#6c63ff,#4c6ef5);
    color:white;
    margin-left:auto;
}

.bot {
    background:white;
}

/* Typing */
.typing {
    font-style: italic;
    color:#888;
}

/* Input */
#inputArea {
    display:flex;
    padding:10px;
    border-top:1px solid #eee;
}

#inputArea input {
    flex:1;
    border-radius:25px;
}

#inputArea button {
    width:45px;
    border-radius:50%;
    margin-left:10px;
}

/* Footer */
#footer {
    text-align:center;
    font-size:12px;
    padding:8px;
}
</style>
</head>

<body>

<!-- 🔥 BACKGROUND TEXT -->
<div id="bg-text">
    Chatbot for
    <span>SoftWallet Innovative Technologies</span>
</div>

<div id="chat-btn" onclick="toggle()">💬</div>

<div id="container">

    <div id="header">
        Chatbot
        <span id="close" onclick="toggle()">✖</span>
    </div>

    <div id="form">
         <!-- NAME -->
        <label style="font-size:13px; margin-left:10px;">Name*</label>
        <input id="name" placeholder="John Doe" style="margin:10px; width:90%; padding:10px; border-radius:10px; border:1px solid #ccc;">

        <!-- EMAIL -->
        <label style="font-size:13px; margin-left:10px;">Email*</label>
        <input id="email" type="email" placeholder="john@example.com" style="margin:10px; width:90%; padding:10px; border-radius:10px; border:1px solid #ccc;">

        <!-- PHONE -->
        <label style="font-size:13px; margin-left:10px;">Phone Number (optional)</label>
        <input 
            id="phone"
            type="tel"
            placeholder="9382838283"
            maxlength="10"
            pattern="[0-9]{10}"
            oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,10)"
            style="margin:10px; width:90%; padding:10px; border-radius:10px; border:1px solid #ccc;"
        >

        <button onclick="startChat()">Start Chat</button>

        <div id="hero-text">
            Chatbot for
            <span>SoftWallet Innovative Technologies</span>
        </div>
    </div>

    <div id="chat">
        <div id="chatbox"></div>

        <div id="inputArea">
            <input id="msg" placeholder="Type your message..." onkeypress="key(event)">
            <button onclick="send()">➤</button>
        </div>

        <div id="footer">Powered by SoftWallet</div>
    </div>

</div>

<script>

let username = "";



// Toggle
function toggle(){
    let box=document.getElementById("container");
    box.style.display = (box.style.display==="flex")?"none":"flex";
}

// Start
function startChat(){

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();

    // 🔥 VALIDATION
    if(!name || !email){
        alert("Please fill Name & Email first");
        return;
    }

    // 🔥 EMAIL CHECK (optional but good)
    let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailPattern.test(email)){
        alert("Enter valid email");
        return;
    }

    username = name;

    // 🔥 SAVE LEAD (AB YAHAN KARO)
    fetch("http://127.0.0.1:9001/lead", {
    	method: "POST",
    	headers: {
        	"Content-Type": "application/x-www-form-urlencoded"
    	},
    	body: `name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&phone=${encodeURIComponent(phone)}`
    });

    document.getElementById("form").style.display="none";

    let chat=document.getElementById("chat");
    chat.style.display="flex";
    chat.classList.add("active");

    addMessage("Hello! 👋 How can I help you today?","bot");
}

// Add message
function addMessage(text,type){
    let div=document.createElement("div");
    div.className="msg "+type;
    div.innerText=text;

    let chatbox=document.getElementById("chatbox");
    chatbox.appendChild(div);
    chatbox.scrollTop = chatbox.scrollHeight;
}

// Send
async function send(){
    let input=document.getElementById("msg");
    let msg=input.value.trim();

    if(!msg) return;

    addMessage(msg,"user");
    input.value="";

    // Typing...
    let typing=document.createElement("div");
    typing.className="msg bot typing";
    typing.innerText="Typing...";
    document.getElementById("chatbox").appendChild(typing);

    try{
        let res=await fetch("http://127.0.0.1:9001/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/x-www-form-urlencoded"
            },
            body:`user_input=${msg}&user=${username}`
        });

        let data=await res.json();

        typing.remove();

        addMessage(data.response || "No response","bot");

    }catch{
        typing.remove();
        addMessage("Server error","bot");
    }
}

// Enter
function key(e){
    if(e.key==="Enter"){
        e.preventDefault();
        send();
    }
}

</script>

</body>
</html>
